server.port=8090
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Acquiring Bank Configuration
acquiring-bank.url=http://localhost:8080
acquiring-bank.payment-endpoint=/payments
acquiring-bank.retry.max-retries=3
acquiring-bank.retry.initial-backoff-millis=100
acquiring-bank.retry.max-backoff-millis=5000
acquiring-bank.retry.backoff-multiplier=2.0